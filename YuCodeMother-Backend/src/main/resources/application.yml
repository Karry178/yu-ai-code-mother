spring:
  application:
    name: YuCodeMother-Backend
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.0.103:3306/yu_ai_code_mother
    username: root
    password: 123456
  # 当前生效的配置文件 - local
  profiles:
    active: local

server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi项目配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yupi.yucodemotherbackend.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn

# AI配置 - DeepSeek大模型
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: <Your API Key>
      model-name: deepseek-chat
      ## 结构化输出的优化技巧
      # 1.设置max_tokens
      max-tokens: 8192
      # 2.JSON Schema配置：严格确保结构化输出生效，DS不支持这个功能，但是有类似的配置 - 设置response-format参数为json_object
      strict-json-schema: true
      response-format: json_object

      log-requests: true
      log-responses: true